<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sudoku - Minimalist Puzzle</title>
    <style>
        :root {
            --bg-color: #f8f9fa;
            --container-bg: #ffffff;
            --text-color: #343a40;
            --primary-color: #4dabf7;
            --accent-color: #339af0;
            --border-color: #dee2e6;
            --grid-border: #adb5bd;
            --cell-size: 50px;
            --font-main: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            --cell-fixed: #495057;
            --cell-input: #228be6;
            --cell-bg-hover: #e7f5ff;
            --cell-bg-selected: #d0ebff;
            --error-color: #fa5252;
            --error-bg: #fff5f5;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--container-bg);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
        }

        h1 {
            margin-top: 0;
            font-weight: 300;
            letter-spacing: 2px;
            color: var(--text-color);
        }

        /* Sudoku Grid */
        #sudoku-grid {
            display: grid;
            grid-template-columns: repeat(9, var(--cell-size));
            grid-template-rows: repeat(9, var(--cell-size));
            border: 2px solid var(--grid-border);
            margin: 20px auto;
            user-select: none;
            width: calc(9 * var(--cell-size));
        }

        .cell {
            width: var(--cell-size);
            height: var(--cell-size);
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            cursor: pointer;
            transition: background-color 0.15s;
        }

        /* 3x3 Grid borders */
        .cell:nth-child(3n) { border-right: 2px solid var(--grid-border); }
        .cell:nth-child(9n) { border-right: 1px solid var(--border-color); }
        .cell:nth-child(n+19):nth-child(-n+27),
        .cell:nth-child(n+46):nth-child(-n+54) { border-bottom: 2px solid var(--grid-border); }
        #sudoku-grid .cell:nth-child(9n) { border-right-width: 0; }
        #sudoku-grid .cell:nth-child(n+73) { border-bottom-width: 0; }

        .cell.fixed { font-weight: bold; color: var(--cell-fixed); cursor: default; }
        .cell.input { color: var(--cell-input); }
        .cell:hover { background-color: var(--cell-bg-hover); }
        .cell.selected { background-color: var(--cell-bg-selected); outline: 2px solid var(--primary-color); z-index: 1; }
        .cell.error { background-color: var(--error-bg); color: var(--error-color); }

        /* Controls */
        .controls {
            margin-top: 1.5rem;
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .num-btn {
            width: 40px;
            height: 40px;
            border: 1px solid var(--border-color);
            background: white;
            border-radius: 4px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .num-btn:hover { background: var(--primary-color); color: white; border-color: var(--primary-color); }

        .action-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            background-color: var(--primary-color);
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .action-btn:hover { background-color: var(--accent-color); }
        .action-btn.secondary { background-color: #adb5bd; }
        .action-btn.secondary:hover { background-color: #868e96; }

        .status { margin-top: 1rem; font-weight: 500; height: 1.5rem; }

        @media (max-width: 500px) {
            :root { --cell-size: 35px; }
            .container { padding: 1rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>SUDOKU</h1>
        <div id="sudoku-grid"></div>
        
        <div class="controls">
            <button class="num-btn" data-val="1">1</button>
            <button class="num-btn" data-val="2">2</button>
            <button class="num-btn" data-val="3">3</button>
            <button class="num-btn" data-val="4">4</button>
            <button class="num-btn" data-val="5">5</button>
            <button class="num-btn" data-val="6">6</button>
            <button class="num-btn" data-val="7">7</button>
            <button class="num-btn" data-val="8">8</button>
            <button class="num-btn" data-val="9">9</button>
            <button class="num-btn" data-val="0" title="Clear">⌫</button>
        </div>

        <div class="controls">
            <button id="new-game" class="action-btn">New Game</button>
            <button id="check-solve" class="action-btn secondary">Check Solution</button>
        </div>

        <div id="status" class="status"></div>
    </div>

    <script>
        class SudokuGame {
            constructor() {
                this.gridElement = document.getElementById('sudoku-grid');
                this.statusElement = document.getElementById('status');
                this.cells = [];
                this.solution = [];
                this.currentPuzzle = [];
                this.selectedCellIdx = null;

                this.init();
            }

            init() {
                // Create cells
                for (let i = 0; i < 81; i++) {
                    const cell = document.createElement('div');
                    cell.classList.add('cell');
                    cell.addEventListener('click', () => this.selectCell(i));
                    this.gridElement.appendChild(cell);
                    this.cells.push(cell);
                }

                document.getElementById('new-game').addEventListener('click', () => this.generateNewGame());
                document.getElementById('check-solve').addEventListener('click', () => this.checkSolution());
                
                // Number pad controls
                document.querySelectorAll('.num-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const val = parseInt(btn.dataset.val);
                        this.setCellValue(this.selectedCellIdx, val);
                    });
                });

                // Keyboard controls
                document.addEventListener('keydown', (e) => {
                    if (this.selectedCellIdx === null) return;
                    if (e.key >= '1' && e.key <= '9') {
                        this.setCellValue(this.selectedCellIdx, parseInt(e.key));
                    } else if (e.key === 'Backspace' || e.key === 'Delete' || e.key === '0') {
                        this.setCellValue(this.selectedCellIdx, 0);
                    } else if (e.key.startsWith('Arrow')) {
                        this.navigate(e.key);
                    }
                });

                this.generateNewGame();
            }

            navigate(key) {
                let row = Math.floor(this.selectedCellIdx / 9);
                let col = this.selectedCellIdx % 9;
                if (key === 'ArrowUp') row = (row + 8) % 9;
                if (key === 'ArrowDown') row = (row + 1) % 9;
                if (key === 'ArrowLeft') col = (col + 8) % 9;
                if (key === 'ArrowRight') col = (col + 1) % 9;
                this.selectCell(row * 9 + col);
            }

            selectCell(idx) {
                if (this.selectedCellIdx !== null) {
                    this.cells[this.selectedCellIdx].classList.remove('selected');
                }
                this.selectedCellIdx = idx;
                this.cells[idx].classList.add('selected');
            }

            setCellValue(idx, val) {
                if (idx === null || this.cells[idx].classList.contains('fixed')) return;
                
                this.cells[idx].textContent = val === 0 ? '' : val;
                this.cells[idx].classList.toggle('input', val !== 0);
                this.cells[idx].classList.remove('error');
                this.statusElement.textContent = '';
            }

            generateNewGame() {
                // 1. Generate full board
                this.solution = this.generateSolvedBoard();
                
                // 2. Remove cells (Difficulty: Easy/Medium ~40 cells removed)
                const puzzle = [...this.solution];
                const attempts = 45; 
                let removed = 0;
                while (removed < attempts) {
                    let idx = Math.floor(Math.random() * 81);
                    if (puzzle[idx] !== 0) {
                        puzzle[idx] = 0;
                        removed++;
                    }
                }
                this.currentPuzzle = puzzle;

                // 3. Render
                this.cells.forEach((cell, i) => {
                    cell.classList.remove('fixed', 'input', 'selected', 'error');
                    if (puzzle[i] !== 0) {
                        cell.textContent = puzzle[i];
                        cell.classList.add('fixed');
                    } else {
                        cell.textContent = '';
                    }
                });
                this.statusElement.textContent = 'Good luck!';
                this.selectCell(0);
            }

            generateSolvedBoard() {
                const board = Array(81).fill(0);
                this.fillBoard(board);
                return board;
            }

            fillBoard(board) {
                for (let i = 0; i < 81; i++) {
                    if (board[i] === 0) {
                        const nums = [1, 2, 3, 4, 5, 6, 7, 8, 9].sort(() => Math.random() - 0.5);
                        for (let num of nums) {
                            if (this.isValid(board, i, num)) {
                                board[i] = num;
                                if (this.fillBoard(board)) return true;
                                board[i] = 0;
                            }
                        }
                        return false;
                    }
                }
                return true;
            }

            isValid(board, idx, num) {
                const row = Math.floor(idx / 9);
                const col = idx % 9;

                // Check row
                for (let i = 0; i < 9; i++) if (board[row * 9 + i] === num) return false;
                // Check col
                for (let i = 0; i < 9; i++) if (board[i * 9 + col] === num) return false;
                // Check 3x3 box
                const boxRow = Math.floor(row / 3) * 3;
                const boxCol = Math.floor(col / 3) * 3;
                for (let r = 0; r < 3; r++) {
                    for (let c = 0; c < 3; c++) {
                        if (board[(boxRow + r) * 9 + (boxCol + c)] === num) return false;
                    }
                }
                return true;
            }

            checkSolution() {
                let complete = true;
                let correct = true;

                this.cells.forEach((cell, i) => {
                    const val = parseInt(cell.textContent) || 0;
                    if (val === 0) {
                        complete = false;
                    } else if (val !== this.solution[i]) {
                        cell.classList.add('error');
                        correct = false;
                    } else {
                        cell.classList.remove('error');
                    }
                });

                if (correct && complete) {
                    this.statusElement.textContent = '🎉 Congratulations! You solved it!';
                    this.statusElement.style.color = 'var(--accent-color)';
                } else if (!complete) {
                    this.statusElement.textContent = 'The board is not yet complete.';
                    this.statusElement.style.color = 'var(--text-color)';
                } else {
                    this.statusElement.textContent = 'Some numbers are incorrect.';
                    this.statusElement.style.color = 'var(--error-color)';
                }
            }
        }

        // Start the game
        window.addEventListener('DOMContentLoaded', () => new SudokuGame());
    </script>
</body>
</html>
